<!DOCTYPE html>
<!--
  Docsify template for the k-ai docs site.
  Copy to repo root as index.html if you split docs into another repo.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>k-ai — Problem-First Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="k-ai architecture docs — problem first, visual, operational, and real.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  <style>
    .sidebar { display: flex !important; flex-direction: column !important; background-color: var(--sidebar-background) !important; }
    .app-name { order: 1 !important; margin-top: 20px !important; font-weight: bold !important; font-size: 1.4rem !important; }
    .search { order: 2 !important; margin-bottom: 20px !important; }
    .sidebar-nav { order: 3 !important; flex: 1 !important; }
    #docsify-darklight-theme { top: 15px !important; right: 15px !important; width: 28px !important; height: 28px !important; box-shadow: 0 0 5px rgba(0,0,0,0.3) !important; }
    .search input { background-color: var(--codeBackgroundColor) !important; border: 1px solid var(--borderColor) !important; color: var(--textColor) !important; border-radius: 3px !important; }
    p code, li code, td code, blockquote code, h1 code, h2 code, h3 code, h4 code {
      background-color: var(--codeBackgroundColor) !important;
      color: var(--codeTextColor) !important;
      padding: 2px 6px !important;
      border-radius: 3px !important;
      font-size: 0.875em !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading k-ai docs...</div>
  <script>
    window.$docsify = {
      name: '🧠 k-ai Docs',
      repo: 'https://github.com/kpihx/k-ai',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: '#007acc',
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Search k-ai docs...',
        noData: '❌ No results found.',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
